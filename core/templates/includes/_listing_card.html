<!-- Usage: {% include "includes/_listing_card.html" with listing=listing %} -->
<a href="{{ listing.get_absolute_url }}"
   class="bg-white rounded-2xl shadow-sm hover:shadow-md transition overflow-hidden group flex flex-col">

  <!-- Image -->
  <div class="h-48 bg-brand-100 overflow-hidden">
    {% with listing.images.first as img %}
      {% if img %}
        <img src="{{ img.image.url }}" alt="{{ listing.title }}"
             class="w-full h-full object-cover group-hover:scale-105 transition duration-300"/>
      {% else %}
        <div class="w-full h-full flex items-center justify-center text-brand-400 text-4xl">🏠</div>
      {% endif %}
    {% endwith %}
  </div>

  <!-- Info -->
  <div class="p-4 flex flex-col gap-1 flex-1">
    <div class="flex items-start justify-between gap-2">
      <h3 class="font-semibold text-gray-800 text-sm leading-snug line-clamp-2 group-hover:text-brand-500 transition">
        {{ listing.title }}
      </h3>
      <span class="text-brand-500 font-bold text-sm whitespace-nowrap">${{ listing.price }}/mo</span>
    </div>
    <p class="text-xs text-gray-400">📍 {{ listing.location }}</p>
    <p class="text-xs text-gray-400 mt-auto pt-2 border-t border-gray-100">
      Available {{ listing.available_from|date:"M j, Y" }} · {{ listing.owner.username }}
    </p>
  </div>

</a>
