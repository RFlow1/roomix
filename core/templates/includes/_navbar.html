<nav class="bg-brand-500 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center gap-6">
      <a href="{% url 'home' %}" class="text-white font-bold text-xl tracking-tight">RoomiX</a>
      <div class="hidden sm:flex items-center gap-1">
        <a href="{% url 'home' %}"
           class="text-blue-100 hover:text-white px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-1">
          🏠 Home
        </a>
        <a href="{% url 'listing-list' %}"
           class="text-blue-100 hover:text-white px-3 py-1.5 rounded-lg text-sm transition flex items-center gap-1">
          🔍 Browse Listings
        </a>
      </div>
    </div>

    <!-- Auth links -->
    <div class="flex items-center gap-3 text-sm">
      {% if user.is_authenticated %}
        <a href="{% url 'listing-create' %}"
           class="text-blue-100 hover:text-white px-3 py-1.5 rounded-lg text-sm transition">
          + Post listing
        </a>

        <!-- Inbox with unread badge -->
        <a href="{% url 'inbox' %}" class="relative text-blue-100 hover:text-white transition px-2">
          💬
          <span id="unread-badge"
                class="absolute -top-2 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 hidden">
            0
          </span>
        </a>

        <a href="{% url 'profile' %}" class="text-blue-100 hover:text-white transition">
          {{ user.username }}
        </a>
        <form method="POST" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="text-blue-200 hover:text-white transition">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}" class="text-blue-100 hover:text-white transition flex items-center gap-1">
          ↪ Login
        </a>
        <a href="{% url 'register' %}"
           class="bg-white text-brand-500 hover:bg-blue-50 font-semibold px-4 py-1.5 rounded-xl transition">
          Get Started
        </a>
      {% endif %}
    </div>
  </div>
</nav>

{% if user.is_authenticated %}
<script>
  function pollUnread() {
    fetch("{% url 'unread-count' %}")
      .then(res => res.json())
      .then(data => {
        const badge = document.getElementById('unread-badge');
        if (data.unread > 0) {
          badge.textContent = data.unread;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      });
  }
  pollUnread();
  setInterval(pollUnread, 10000);
</script>
{% endif %}
