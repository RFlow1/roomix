<nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
  
      <!-- Logo -->
      <a href="{% url 'home' %}" class="text-brand-500 font-bold text-xl tracking-tight">
        🏠 Roomix
      </a>
  
      <!-- Search bar -->
      <form method="GET" action="{% url 'home' %}" class="hidden sm:flex items-center gap-2">
        <input
          type="text" name="q" value="{{ request.GET.q }}"
          placeholder="Search by location or title..."
          class="border border-gray-200 rounded-xl px-4 py-1.5 text-sm w-64
                 focus:outline-none focus:ring-2 focus:ring-brand-400"
        />
        <button type="submit"
          class="bg-brand-500 hover:bg-brand-600 text-white text-sm px-4 py-1.5 rounded-xl transition">
          Search
        </button>
      </form>
  
      <!-- Auth links -->
      <div class="flex items-center gap-3 text-sm">
        {% if user.is_authenticated %}
          <a href="{% url 'listing-create' %}"
             class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-1.5 rounded-xl transition">
            + Post listing
          </a>
          <a href="{% url 'profile' %}" class="text-gray-600 hover:text-brand-500 transition">
            {{ user.username }}
          </a>
          <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="text-gray-400 hover:text-red-400 transition">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="text-gray-600 hover:text-brand-500 transition">Log in</a>
          <a href="{% url 'register' %}"
             class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-1.5 rounded-xl transition">
            Sign up
          </a>
        {% endif %}
      </div>
  
    </div>
  </nav>
